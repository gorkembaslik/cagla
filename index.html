<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çağla Öztürk — Artist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #f5f3ef;
    }

    .splash {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-bg {
      position: absolute;
      inset: 0;
      background-image: url('images/cagla_buyuk_Dalga-2024.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.78);
    }

    .splash-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
    }

    .splash-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 5vw, 4.2rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2.4rem;
      text-shadow: 0 2px 24px rgba(0,0,0,0.25);
    }

    .enter-link {
      display: inline-block;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.7rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.65);
      padding: 0.65rem 2.2rem;
      transition: background 0.35s, border-color 0.35s;
    }

    .enter-link:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.95);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <h1 class="splash-name">Çağla Öztürk</h1>
      <a class="enter-link" href="paintings.html">Enter</a>
    </div>
  </div>
</body>
</html>
